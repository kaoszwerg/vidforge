<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Vidforge — a filled play triangle (video) inside a broken convert ring with two tangential
       arrowheads (re-encode / convert / queue progress). The play glyph carries the mark at 32px;
       the ring adds the "transform" reading at larger sizes. Same construction language as the HUD
       panels: hard geometry, neon cyan->green gradient on a near-black chamfered plate. -->
  <defs>
    <linearGradient id="edge" x1="0" y1="200" x2="0" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff" />
      <stop offset="1" stop-color="#00ff88" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="208" fill="#0a0a0f" />
  <rect x="42" y="42" width="940" height="940" rx="176" fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.22" />

  <!-- Convert ring: two arcs with gaps at top and bottom -->
  <g stroke="url(#edge)" stroke-width="44" fill="none" stroke-linecap="round">
    <path d="M577 207 A312 312 0 0 1 577 817" />
    <path d="M447 817 A312 312 0 0 1 447 207" />
  </g>
  <!-- Rotational arrowheads: bottom points left, top points right (the convert cue) -->
  <g fill="url(#edge)">
    <path d="M505 817 L583 781 L583 853 Z" />
    <path d="M519 207 L441 171 L441 243 Z" />
  </g>

  <!-- Play triangle: the video glyph, rounded via a matching stroke join -->
  <path d="M430 384 L430 640 L694 512 Z" fill="url(#edge)" stroke="url(#edge)" stroke-width="36" stroke-linejoin="round" />
</svg>
