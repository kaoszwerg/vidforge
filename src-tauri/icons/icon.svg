<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- saga-rust-template — isometric wireframe cube: the generative primitive. A hexagonal outline with the
       three inner edges meeting at the centre vertex reads as a cube from any distance and stays
       legible at 32px. Same construction language as the HUD panels: hard geometry, neon gradient
       on a near-black chamfered plate. -->
  <defs>
    <linearGradient id="edge" x1="0" y1="220" x2="0" y2="804" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00e5ff" />
      <stop offset="1" stop-color="#00ff88" />
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="208" fill="#0a0a0f" />
  <rect x="42" y="42" width="940" height="940" rx="176" fill="none" stroke="#00e5ff" stroke-width="5" opacity="0.22" />

  <g stroke="url(#edge)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer hexagon: the cube silhouette -->
    <path d="M512 220 L784 372 L784 668 L512 820 L240 668 L240 372 Z" />
    <!-- Inner edges meeting at the centre vertex -->
    <path d="M512 220 L512 520" />
    <path d="M512 520 L784 372" />
    <path d="M512 520 L240 372" />
  </g>

  <!-- Centre vertex node -->
  <circle cx="512" cy="520" r="34" fill="#00ff88" />
</svg>
