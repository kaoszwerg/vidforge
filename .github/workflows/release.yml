# Cross-platform release build of FINAL versions only (ADR-APP-023, ADR-CORE-024, rule:automation). Triggered
# by a `vX.Y.Z` tag (or manual dispatch) — never on ordinary pushes, so CI never builds dev or
# intermediate artifacts. macOS is signed + notarised when the APPLE_* secrets are present, else the
# build is unsigned.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux WebKit/Tauri build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Release title from the identity SSOT (ADR-APP-031): productName in tauri.conf.json is identity-synced,
      # so every fork's release is titled with its own app name without editing this pinned, template-owned
      # workflow (ADR-CORE-030) — read at runtime instead of hardcoding a placeholder name.
      - name: Resolve product name from app identity
        id: identity
        shell: bash
        run: |
          product_name=$(node -p "require('./src-tauri/tauri.conf.json').productName")
          echo "product_name=$product_name" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarisation — used only when configured (ADR-APP-023); unsigned otherwise.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ steps.identity.outputs.product_name }} ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
